services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: letsgo
      POSTGRES_PASSWORD: letsgo
      POSTGRES_DB: letsgo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letsgo"]
      interval: 5s
      retries: 5

  app:
    image: ghcr.io/sighmons/lets-go:latest
    restart: unless-stopped
    ports:
      - "80:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://letsgo:letsgo@db:5432/letsgo
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
